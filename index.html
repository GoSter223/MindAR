<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
        />
        <title>MindAR - Earth Visual</title>

        <!-- A-Frame -->
        <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
        <!-- MindAR Image Tracking untuk A-Frame -->
        <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
                height: 100%;
                width: 100%;
                font-family: Arial, Helvetica, sans-serif;
            }

            a-scene {
                width: 100%;
                height: 100%;
            }

            /* Overlay teks petunjuk saat scanning */
            #scanning-overlay {
                position: fixed;
                top: 20px;
                left: 0;
                width: 100%;
                text-align: center;
                color: #fff;
                font-size: 16px;
                text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
                pointer-events: none;
                z-index: 999;
            }

            /* Layar loading sederhana */
            #loading-screen {
                position: fixed;
                inset: 0;
                background: #000;
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                z-index: 1000;
                transition: opacity 0.4s ease;
            }
            #loading-screen.hidden {
                opacity: 0;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div id="loading-screen">Memuat AR, mohon tunggu...</div>
        <div id="scanning-overlay">Arahkan kamera ke target gambar</div>

        <a-scene
            mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;"
            color-space="sRGB"
            renderer="colorManagement: true, physicallyCorrectLights: true"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
        >
            <a-assets timeout="30000">
                <a-asset-item
                    id="earthModel"
                    src="./EarthVisual.gltf"
                ></a-asset-item>
            </a-assets>

            <a-camera
                position="0 0 0"
                look-controls="enabled: false"
                cursor="fuse: false; rayOrigin: mouse;"
            ></a-camera>

            <a-entity mindar-image-target="targetIndex: 0">
                <a-gltf-model
                    id="earth"
                    src="#earthModel"
                    position="0 0 0"
                    rotation="0 0 0"
                    scale="0.3 0.3 0.3"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear;"
                ></a-gltf-model>
            </a-entity>
        </a-scene>

        <script>
            const sceneEl = document.querySelector("a-scene");
            const loadingScreen = document.getElementById("loading-screen");
            const scanningOverlay = document.getElementById("scanning-overlay");

            sceneEl.addEventListener("renderstart", () => {
                loadingScreen.classList.add("hidden");
            });

            const targetEntity = document.querySelector(
                "[mindar-image-target]",
            );

            targetEntity.addEventListener("targetFound", () => {
                scanningOverlay.style.display = "none";
            });

            targetEntity.addEventListener("targetLost", () => {
                scanningOverlay.style.display = "block";
            });
        </script>
    </body>
</html>
